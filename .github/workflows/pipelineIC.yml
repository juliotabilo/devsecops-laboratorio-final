name: WorkFlow para IC - DevSecOps

on:
  push:
    branches:
      - feat-devsecops

jobs:
  JTRPipeline:
    runs-on: ubuntu-latest
    steps:
      # 1. Clonar repositorio completo
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2.0 Validar existencia o crear proyecto en SonarCloud
      - name: Validar o crear proyecto en SonarCloud
        id: validateProjectSonar
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" -u "$SONAR_TOKEN:" \
            "https://sonarcloud.io/api/projects/search?projects=devsecops-laboratorio-final")
          
          if [[ "$response" != "200" ]]; then
            echo "Proyecto no existe, creando..."
            curl -s -X POST -u "$SONAR_TOKEN:" \
              -H "Content-Type: application/json" \
              -d '{"name": "devsecops", "project": "devsecops-laboratorio-final", "organization":"juliotabilo"}' \
              "https://sonarcloud.io/api/projects/create"
          else
            echo "Proyecto ya existe."
          fi


      # 2.1 Análisis SonarCloud (SAST)
      - name: SonarCloud
        uses: SonarSource/sonarqube-scan-action@v5.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: -Dsonar.qualitygate.wait=true

      # 3.0 Preparar Node.js para SCA
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # 3.1 Instalar dependencias npm
      - name: Install dependencies
        run: npm ci
        continue-on-error: true

      # 3.2 Generar reporte HTML de SCA
      - name: Generar reporte HTML SCA
        run: |
          npm audit --json | npx npm-audit-html@beta --output ReporteSCA.html || true
          echo "=== Archivos generados ==="
          ls -la ReporteSCA.html
        continue-on-error: true

      # 3.3 Publicar reporte SCA como artefacto
      - name: Publicar reporte SCA
        uses: actions/upload-artifact@v4
        with:
          name: sca-audit-report
          path: ReporteSCA.html

      # 3.4 Ejecutar npm audit para fallo en vulnerabilidades medias o mayores
      - name: SCA - npm audit (falla si hay vulnerabilidades medias o mayores)
        run: npm audit --audit-level=moderate
        continue-on-error: true

      # 4. Construcción de la Imagen Docker
      - name: Construcción de imagen Docker
        run: docker build -t movies-app:latest .

      # 5. Escaneo de vulnerabilidades de imagen Docker con Trivy
      - name: Escaneo de imagen con Trivy  
        uses: aquasecurity/trivy-action@b6643a29fecd7f34b3597bc6acb0a98b03d33ff8
        with:
          image-ref: movies-app:latest
          severity: CRITICAL,HIGH,MEDIUM
          #exit-code: 1
          format: table
          ignore-unfixed: false
          continue-on-error: true


      # 5.1. Generar reporte HTML Trivy usando plantilla local
      - name: Generar reporte HTML de Trivy
        if: always()
        run: |
          trivy image --format template --template "@.github/trivy/html.tpl" --output trivy-report.html movies-app:latest
          echo "Reporte HTML de Trivy generado con éxito."


      # 5.2. Publicar reporte Trivy HTML
      - name: Publicar reporte Trivy HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-html-report
          path: trivy-report.html

