#Pipeline IC - DevSecOps Tarea Final (Desarrollado por Julio Tabilo Riquelme - tabilo.julio@gmail.com)
name: WorkFlow para IC - DevSecOps

on:
  push:
    branches:
      - feat-devsecops

jobs:
  JTRPipeline:
    runs-on: ubuntu-latest
    steps:
      # 1. Clonación de repositorio
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Validar o crear proyecto en SonarCloud
      - name: Validando existencia de Proyecto en Sonarcloud
        id: validateProjectSonar
        run: |
          curl -X POST -u '${{ secrets.SONAR_TOKEN }}:' 'https://sonarcloud.io/api/projects/create' -d 'name=${{github.event.repository.name}}' -d 'organization=juliotabilo' -d 'project=${{github.event.repository.name}}' -d 'visibility=public'
          if [ $? -eq 0 ]; then
            echo "Proyecto creado o ya existe en SonarCloud"
            curl -X POST -u '${{ secrets.SONAR_TOKEN }}:' 'https://sonarcloud.io/api/project_branches/rename' -d 'name=main' -d 'project=${{github.event.repository.name}}'
          else
            echo "Error al crear el proyecto en SonarCloud"
            exit 1
          fi

      # 3. Análisis SonarCloud SAST
      - name: Analisis SonarCloud
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        #with:
        #  args: -Dsonar.qualitygate.wait=true

      # 4. Preparar Node.js para SCA
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # 5. Instalar dependencias
      - name: Install dependencies
        run: npm ci

      # 6. Generar y publicar reporte HTML de SCA (no falla el pipeline)
      - name: Generar reporte HTML SCA
        run: |
          npm audit --json | npx npm-audit-html@beta --output ReporteSCA.html || true
          echo "=== Archivos generados ==="
          ls -la ReporteSCA.html
      - name: Publicar reporte SCA
        uses: actions/upload-artifact@v4
        with:
          name: sca-audit-report
          path: ReporteSCA.html

      # 7. SCA - npm audit (falla si hay vulnerabilidades medias o mayores, sin continue-on-error)
      - name: SCA - npm audit (falla si hay vulnerabilidades medias o mayores)
        run: npm audit --audit-level=moderate

      # 8. Construcción de imagen Docker
      - name: Construcción de imagen Docker
        run: docker build -t movies-app:latest .

      # 9. Escaneo de imagen con Trivy (falla si hay vulnerabilidades)
      - name: Escaneo de imagen con Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: movies-app:latest
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: 1
          format: table
          ignore-unfixed: false

      # 10. Generar reporte HTML Trivy usando plantilla local (siempre se ejecuta)
      - name: Generar reporte HTML de Trivy
        if: always()
        run: |
          trivy image --format template --template "@.github/trivy/html.tpl" --output trivy-report.html movies-app:latest
          echo "Reporte HTML de Trivy generado con éxito."

      # 11. Publicar reporte Trivy HTML (siempre se ejecuta)
      - name: Publicar reporte Trivy HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-html-report
          path: trivy-report.html

      # 12. Notificar fallo a Slack si ocurre un error en el pipeline
      - name: Notificar fallo a Slack
        if: failure()
        run: |
          curl -X POST -H "Content-type: application/json" --data "{\"text\":\"🚨 Pipeline falló en el job JTRPipeline. Revisa aquí: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" ${{ secrets.SLACK_WEBHOOK_URL }}
