name: WorkFlow para IC - DevSecOps

on:
  push:
    branches:
      - feat-devsecops

jobs:
  JTRPipeline:
    runs-on: ubuntu-latest
    steps:
      # 1. Clonar repositorio completo
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2.0 Validar existencia o crear proyecto en SonarCloud
      - name: Validando existencia de Proyecto en Sonarcloud
        id: validateProjectSonar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          curl -s -X POST -u "$SONAR_TOKEN:" \
            'https://sonarcloud.io/api/projects/create' \
            -d "name=${{ github.event.repository.name }}" \
            -d "organization=juliotabilo" \
            -d "project=${{ github.event.repository.name }}" \
            -d "visibility=public" || true
          echo "Proyecto creado o ya existente en SonarCloud"

      # 2.1 Análisis SonarCloud (SAST)
      - name: SonarCloud
        uses: SonarSource/sonarcloud-github-action@v5.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: -Dsonar.qualitygate.wait=true


