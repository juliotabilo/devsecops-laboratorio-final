name: WorkFlow para IC - DevSecOps

on:
  push:
    branches:
      - feat-devsecops

jobs:
  JTRPipeline:
    runs-on: ubuntu-latest
    steps:
        - name: Checkout repository
          uses: actions/checkout@v4

        #- name: Imprimir Hola Mundo
          #run: echo "Hola Mundo desde GitHub Actions (Mi primer Job)"

        #Analisis SAST
        - name: Validando existencia de Proyecto en Sonarcloud
          id: validateProjectSonar
          run: |
            curl -X POST -u '${{ secrets.SONAR_TOKEN }}:' 'https://sonarcloud.io/api/projects/create' -d 'name=${{github.event.repository.name}}' -d 'organization=juliotabilo' -d 'project=${{github.event.repository.name}}' -d 'visibility=public'
            if [ $? -eq 0 ]; then
              echo "Proyecto creado o ya existe en SonarCloud"
              curl -X POST -u '${{ secrets.SONAR_TOKEN }}:' 'https://sonarcloud.io/api/project_branches/rename' -d 'name=main' -d 'project=${{github.event.repository.name}}'

            else
              echo "Error al crear el proyecto en SonarCloud"
              exit 1
            fi

        - name: Analisis SonarCloud
          uses: SonarSource/sonarcloud-github-action@master
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          #with:
            # args: -Dsonar.qualitygate.wait=true #Estas Lineas hacen que falle el pipeline si encuentra vulnerabilidades críticas, altas o medias (Asi esta definido el quality gate en SonarCloud)
          #continue-on-error: false Esta Linea hace que si hay error en el Pipeline se quiebre
          continue-on-error: true  # Esta línea hace que no haya quiebre en el Pipeline (A pesar que haya error sigue)

        - name: Instalar y generar reporte SonarCloud
          run: |
            npm install -g sonar-report
            sonar-report \
              --sonarurl="https://sonarcloud.io" \
              --sonartoken="${{ secrets.SONAR_TOKEN }}" \
              --sonarorganization="juliotabilo" \
              --sonarcomponent="devsecops-laboratorio-final" > sonar-report.html
          continue-on-error: true

        - name: Publicar reporte SonarCloud HTML
          uses: actions/upload-artifact@v4
          with:
            name: sast-sonar-report
            path: sonar-report.html



          # Analisis SCA
        - name: Setup Node.js
          uses: actions/setup-node@v4
          with:
            node-version: '18'
        - name: Install dependencies
          run: npm install
          continue-on-error: true
        - name: Generar reporte HTML SCA (Otra Versión)
          run: |
            npm audit --json | npx npm-audit-html@beta --output ReporteSCA.html || true
            echo "=== Archivos generados ==="
            ls -la *.html
          continue-on-error: true
        
        - name: Publicar reporte SCA como artefacto
          uses: actions/upload-artifact@v4
          with:
            name: sca-audit-report
            path: "*.html"
        - name: SCA - npm audit (falla con vulnerabilidades)
          run: npm audit --audit-level=moderate #Esta linea hace que falle si hay vulnerabilidades medias o mayores
          continue-on-error: true #Con esta linea no se quiebra el Pipeline



           
